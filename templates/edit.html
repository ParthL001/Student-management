<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Edit Student</h2>
        <form method="POST">
            <input type="text" name="name" value="{{student[1]}}" required>
            <input type="text" name="roll_no" value="{{student[2]}}" required>
            <input type="text" name="subject" value="{{student[3]}}" required>
            <input type="number" name="marks" value="{{student[4]}}" required>
            <button type="submit">Update</button>
        </form>
    </div>
</body>
</html>
